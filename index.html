<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Domain Checker — Powered by Spaceship</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #050914;
    --surface: #0c1428;
    --surface2: #111e38;
    --border: rgba(99, 179, 255, 0.12);
    --accent: #3b82f6;
    --accent2: #06d6a0;
    --accent3: #f72585;
    --text: #e8f0ff;
    --text-dim: #7a94c1;
    --text-muted: #3a5080;
    --available: #06d6a0;
    --unavailable: #f72585;
    --premium: #ffd166;
    --glow: rgba(59, 130, 246, 0.15);
  }

  html { scroll-behavior: smooth; }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === STARFIELD === */
  #starfield {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 0;
  }

  /* === LAYOUT === */
  .wrapper {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 0 24px 80px;
  }

  /* === HEADER === */
  header {
    padding: 56px 0 48px;
    text-align: center;
  }

  .logo-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 100px;
    padding: 6px 16px 6px 10px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: var(--text-dim);
    letter-spacing: 0.08em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .logo-badge .dot {
    width: 8px; height: 8px;
    background: var(--accent2);
    border-radius: 50%;
    animation: pulse-dot 2s ease-in-out infinite;
  }

  @keyframes pulse-dot {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  h1 {
    font-size: clamp(2.6rem, 6vw, 4rem);
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1.05;
    margin-bottom: 16px;
  }

  h1 span {
    background: linear-gradient(135deg, #3b82f6 0%, #06d6a0 60%, #3b82f6 100%);
    background-size: 200% 200%;
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    animation: gradient-shift 4s ease infinite;
  }

  @keyframes gradient-shift {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .subtitle {
    color: var(--text-dim);
    font-size: 1.05rem;
    font-weight: 400;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* === SEARCH BOX === */
  .search-section {
    margin-bottom: 40px;
  }

  .search-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    box-shadow: 0 0 60px var(--glow);
  }

  .input-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
  }

  .domain-input-wrap {
    flex: 1;
    position: relative;
  }

  .domain-input-wrap input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 18px 14px 48px;
    font-family: 'Space Mono', monospace;
    font-size: 0.95rem;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  .domain-input-wrap input::placeholder { color: var(--text-muted); }

  .domain-input-wrap input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.12);
  }

  .domain-input-wrap .input-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-muted);
    font-size: 1.1rem;
    pointer-events: none;
  }

  .btn-search {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 14px 28px;
    font-family: 'Syne', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .btn-search:hover {
    background: #2563eb;
    box-shadow: 0 0 20px rgba(59, 130, 246, 0.4);
  }

  .btn-search:active { transform: scale(0.97); }
  .btn-search:disabled { opacity: 0.5; cursor: not-allowed; }

  /* TLD toggles */
  .tld-label {
    font-size: 0.78rem;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    margin-bottom: 10px;
  }

  .tld-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .tld-tag {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 12px;
    font-family: 'Space Mono', monospace;
    font-size: 0.82rem;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.15s;
    user-select: none;
  }

  .tld-tag:hover { border-color: var(--accent); color: var(--accent); }

  .tld-tag.active {
    background: rgba(59, 130, 246, 0.15);
    border-color: var(--accent);
    color: var(--accent);
  }

  /* === RESULTS === */
  #results { min-height: 100px; }

  .results-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
  }

  .results-title {
    font-size: 0.85rem;
    font-family: 'Space Mono', monospace;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  .results-count {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
  }

  .results-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 12px;
  }

  .result-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
    animation: card-in 0.3s ease both;
  }

  @keyframes card-in {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .result-card:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0,0,0,0.3);
  }

  .result-card.available {
    border-color: rgba(6, 214, 160, 0.3);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(6, 214, 160, 0.04) 100%);
  }

  .result-card.unavailable {
    border-color: rgba(247, 37, 133, 0.2);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(247, 37, 133, 0.03) 100%);
  }

  .result-card.premium {
    border-color: rgba(255, 209, 102, 0.3);
    background: linear-gradient(135deg, var(--surface) 0%, rgba(255, 209, 102, 0.04) 100%);
  }

  .result-domain {
    font-family: 'Space Mono', monospace;
    font-size: 0.9rem;
    color: var(--text);
    word-break: break-all;
    flex: 1;
  }

  .result-right {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
    flex-shrink: 0;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 0.72rem;
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    padding: 3px 10px;
    border-radius: 100px;
  }

  .status-badge.available {
    background: rgba(6, 214, 160, 0.12);
    color: var(--available);
    border: 1px solid rgba(6, 214, 160, 0.25);
  }

  .status-badge.unavailable {
    background: rgba(247, 37, 133, 0.1);
    color: var(--unavailable);
    border: 1px solid rgba(247, 37, 133, 0.2);
  }

  .status-badge.premium {
    background: rgba(255, 209, 102, 0.1);
    color: var(--premium);
    border: 1px solid rgba(255, 209, 102, 0.25);
  }

  .status-badge .indicator {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: currentColor;
  }

  .price-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--premium);
  }

  .register-btn {
    font-size: 0.72rem;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    color: var(--accent2);
    background: rgba(6, 214, 160, 0.1);
    border: 1px solid rgba(6, 214, 160, 0.25);
    border-radius: 6px;
    padding: 3px 10px;
    cursor: pointer;
    text-decoration: none;
    transition: background 0.15s;
    white-space: nowrap;
  }

  .register-btn:hover { background: rgba(6, 214, 160, 0.2); }

  /* === SKELETON LOADING === */
  .skeleton-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px 20px;
    height: 68px;
    position: relative;
    overflow: hidden;
  }

  .skeleton-card::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent 0%, rgba(99,179,255,0.05) 50%, transparent 100%);
    background-size: 200% 100%;
    animation: shimmer 1.4s ease infinite;
  }

  @keyframes shimmer {
    0% { background-position: -200% 0; }
    100% { background-position: 200% 0; }
  }

  /* === SINGLE DOMAIN CHECK === */
  .single-check {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 28px;
    margin-bottom: 20px;
    box-shadow: 0 0 60px var(--glow);
    animation: card-in 0.3s ease both;
  }

  .single-check-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 20px;
  }

  .single-domain-name {
    font-family: 'Space Mono', monospace;
    font-size: 1.4rem;
    font-weight: 700;
    color: var(--text);
    word-break: break-all;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 12px;
    margin-top: 16px;
  }

  .detail-item {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
  }

  .detail-label {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 5px;
  }

  .detail-value {
    font-size: 0.88rem;
    color: var(--text);
    font-weight: 600;
    word-break: break-word;
  }

  .detail-value.green { color: var(--available); }
  .detail-value.red { color: var(--unavailable); }
  .detail-value.yellow { color: var(--premium); }
  .detail-value.blue { color: var(--accent); }

  /* === TABS === */
  .tabs {
    display: flex;
    gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 5px;
    margin-bottom: 28px;
  }

  .tab-btn {
    flex: 1;
    background: none;
    border: none;
    border-radius: 10px;
    padding: 10px 16px;
    font-family: 'Syne', sans-serif;
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:hover { color: var(--text-dim); }

  .tab-btn.active {
    background: var(--surface2);
    color: var(--text);
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* === MY DOMAINS === */
  .domain-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 16px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 10px;
    transition: border-color 0.2s;
    animation: card-in 0.3s ease both;
  }

  .domain-row:hover { border-color: rgba(99,179,255,0.2); }

  .domain-row-left { flex: 1; min-width: 0; }

  .domain-row-name {
    font-family: 'Space Mono', monospace;
    font-size: 0.92rem;
    color: var(--text);
    margin-bottom: 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .domain-row-meta {
    display: flex;
    gap: 12px;
    font-size: 0.72rem;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    flex-wrap: wrap;
  }

  .lifecycle-badge {
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.68rem;
    font-family: 'Space Mono', monospace;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    font-weight: 700;
  }

  .lifecycle-badge.registered {
    background: rgba(6, 214, 160, 0.1);
    color: var(--available);
    border: 1px solid rgba(6, 214, 160, 0.2);
  }

  .lifecycle-badge.expired {
    background: rgba(247, 37, 133, 0.1);
    color: var(--unavailable);
    border: 1px solid rgba(247, 37, 133, 0.2);
  }

  .lifecycle-badge.pendingDelete {
    background: rgba(255, 209, 102, 0.1);
    color: var(--premium);
    border: 1px solid rgba(255, 209, 102, 0.2);
  }

  /* === EMPTY / ERROR states === */
  .state-msg {
    text-align: center;
    padding: 48px 24px;
    color: var(--text-muted);
    font-family: 'Space Mono', monospace;
    font-size: 0.85rem;
    line-height: 1.7;
  }

  .state-msg .icon { font-size: 2.5rem; margin-bottom: 12px; display: block; }

  .state-msg.error-msg { color: #f72585; }

  .cors-warning {
    background: rgba(255, 209, 102, 0.06);
    border: 1px solid rgba(255, 209, 102, 0.25);
    border-radius: 12px;
    padding: 16px 20px;
    margin-top: 16px;
    font-size: 0.8rem;
    color: var(--premium);
    line-height: 1.6;
    font-family: 'Space Mono', monospace;
  }

  .cors-warning strong { color: #ffd166; }

  /* === FOOTER === */
  footer {
    text-align: center;
    padding: 40px 0 0;
    border-top: 1px solid var(--border);
    color: var(--text-muted);
    font-size: 0.75rem;
    font-family: 'Space Mono', monospace;
  }

  footer a { color: var(--text-dim); text-decoration: none; }
  footer a:hover { color: var(--accent); }

  /* Spinner */
  .spinner {
    width: 18px; height: 18px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    display: inline-block;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* === RESPONSIVE === */
  @media (max-width: 520px) {
    .input-row { flex-direction: column; }
    .results-grid { grid-template-columns: 1fr; }
    h1 { font-size: 2rem; }
    .single-domain-name { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<canvas id="starfield"></canvas>

<div class="wrapper">
  <header>
    <div class="logo-badge">
      <span class="dot"></span>
      Spaceship API — Domain Checker
    </div>
    <h1>Find Your<br><span>Perfect Domain</span></h1>
    <p class="subtitle">Check availability, explore TLDs, and manage your domains — all in one place.</p>
  </header>

  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('check')">🔍 Availability Check</button>
    <button class="tab-btn" onclick="switchTab('single')">📄 Domain Info</button>
    <button class="tab-btn" onclick="switchTab('mydomains')">🚀 My Domains</button>
  </div>

  <!-- TAB: AVAILABILITY CHECK -->
  <div id="tab-check" class="tab-panel active">
    <div class="search-section">
      <div class="search-card">
        <div class="input-row">
          <div class="domain-input-wrap">
            <span class="input-icon">🌐</span>
            <input type="text" id="domainInput" placeholder="yourbrand" autocomplete="off" spellcheck="false"
              onkeydown="if(event.key==='Enter') checkAvailability()">
          </div>
          <button class="btn-search" id="checkBtn" onclick="checkAvailability()">
            <span id="checkBtnLabel">Check</span>
          </button>
        </div>
        <div class="tld-label">Select TLDs to check</div>
        <div class="tld-grid" id="tldGrid"></div>
      </div>
    </div>
    <div id="results"></div>
  </div>

  <!-- TAB: SINGLE DOMAIN INFO -->
  <div id="tab-single" class="tab-panel">
    <div class="search-card" style="margin-bottom:20px;">
      <div class="input-row">
        <div class="domain-input-wrap">
          <span class="input-icon">🔎</span>
          <input type="text" id="singleInput" placeholder="example.com" autocomplete="off" spellcheck="false"
            onkeydown="if(event.key==='Enter') checkSingle()">
        </div>
        <button class="btn-search" id="singleBtn" onclick="checkSingle()">
          <span id="singleBtnLabel">Look Up</span>
        </button>
      </div>
    </div>
    <div id="singleResult"></div>
  </div>

  <!-- TAB: MY DOMAINS -->
  <div id="tab-mydomains" class="tab-panel">
    <div id="myDomainsResult">
      <div class="state-msg">
        <span class="icon">🛸</span>
        Click below to load your registered domains.
      </div>
      <div style="text-align:center; margin-top:16px;">
        <button class="btn-search" style="margin:0 auto; display:inline-flex;" onclick="loadMyDomains()">
          <span id="myDomainsBtnLabel">Load My Domains</span>
        </button>
      </div>
    </div>
  </div>

  <footer>
    <p>Powered by <a href="https://spaceship.dev" target="_blank">Spaceship API</a> &nbsp;·&nbsp; Built for GitHub Pages &nbsp;·&nbsp; 2026</p>
  </footer>
</div>

<script>
// ============================================================
// CONFIG
// ============================================================
const API_KEY    = 'vCSAJbHmxt5GOyWFBtoV';
const API_SECRET = 'UJuAxmCDYbKRVgx8v2S1ApjbGwP8JwRP2OdRdyZduNEpCYetl6wLIlAeirePyi8n';
const BASE_URL   = 'https://spaceship.dev/api/v1';

const HEADERS = {
  'X-API-Key': API_KEY,
  'X-API-Secret': API_SECRET,
  'Content-Type': 'application/json'
};

// ============================================================
// TLD CONFIG
// ============================================================
const DEFAULT_TLDS = ['.com','.net','.org','.io','.co','.ai','.dev','.app','.xyz','.me','.info','.us','.ca','.uk'];
let activeTlds = new Set(['.com','.net','.org','.io','.co']);

function buildTldGrid() {
  const grid = document.getElementById('tldGrid');
  grid.innerHTML = '';
  DEFAULT_TLDS.forEach(tld => {
    const tag = document.createElement('button');
    tag.className = 'tld-tag' + (activeTlds.has(tld) ? ' active' : '');
    tag.textContent = tld;
    tag.onclick = () => {
      if (activeTlds.has(tld)) {
        if (activeTlds.size === 1) return;
        activeTlds.delete(tld);
        tag.classList.remove('active');
      } else {
        activeTlds.add(tld);
        tag.classList.add('active');
      }
    };
    grid.appendChild(tag);
  });
}
buildTldGrid();

// ============================================================
// TABS
// ============================================================
function switchTab(id) {
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + id).classList.add('active');
  document.querySelectorAll('.tab-btn')[['check','single','mydomains'].indexOf(id)].classList.add('active');
}

// ============================================================
// STARFIELD
// ============================================================
(function() {
  const canvas = document.getElementById('starfield');
  const ctx = canvas.getContext('2d');
  let stars = [];

  function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
  }

  function init() {
    resize();
    stars = [];
    for (let i = 0; i < 160; i++) {
      stars.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        r: Math.random() * 1.2,
        alpha: Math.random() * 0.5 + 0.1,
        speed: Math.random() * 0.008 + 0.002,
        phase: Math.random() * Math.PI * 2
      });
    }
  }

  let frame = 0;
  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    frame++;
    stars.forEach(s => {
      const a = s.alpha * (0.6 + 0.4 * Math.sin(s.phase + frame * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(180, 210, 255, ${a})`;
      ctx.fill();
    });
    requestAnimationFrame(draw);
  }

  init();
  draw();
  window.addEventListener('resize', init);
})();

// ============================================================
// API HELPERS
// ============================================================
async function apiFetch(path, options = {}) {
  const url = BASE_URL + path;
  const res = await fetch(url, {
    ...options,
    headers: { ...HEADERS, ...(options.headers || {}) }
  });
  if (!res.ok) {
    const err = await res.json().catch(() => ({ detail: res.statusText }));
    throw new Error(err.detail || `HTTP ${res.status}`);
  }
  return res.json();
}

function corsErrorHtml(action) {
  return `
    <div class="cors-warning">
      <strong>⚠️ CORS Notice</strong><br><br>
      Browser security (CORS) may block direct API calls to <code>spaceship.dev</code> from GitHub Pages.<br><br>
      <strong>To fix this for production:</strong>
      <ul style="margin-top:8px; padding-left:18px; line-height:1.8;">
        <li>Deploy a small proxy (Cloudflare Worker, Vercel Edge Function, or Express server) that forwards requests with your API credentials</li>
        <li>Update <code>BASE_URL</code> at the top of the script to point to your proxy</li>
      </ul>
    </div>
  `;
}

// ============================================================
// CHECK AVAILABILITY (bulk)
// ============================================================
async function checkAvailability() {
  const raw = document.getElementById('domainInput').value.trim().toLowerCase();
  if (!raw) return;

  // Strip any TLD the user typed
  const name = raw.replace(/\..*$/, '');
  const domains = [...activeTlds].map(tld => name + tld);

  const btn = document.getElementById('checkBtn');
  const label = document.getElementById('checkBtnLabel');
  btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span>';

  const res = document.getElementById('results');
  res.innerHTML = `
    <div class="results-header">
      <span class="results-title">Checking ${domains.length} domains…</span>
    </div>
    <div class="results-grid">
      ${domains.map(() => '<div class="skeleton-card"></div>').join('')}
    </div>`;

  try {
    const data = await apiFetch('/domains/available', {
      method: 'POST',
      body: JSON.stringify({ domains })
    });

    const items = data.domains || [];
    const available = items.filter(d => d.result === 'available' && !d.premiumPricing?.length).length;
    const premium   = items.filter(d => d.premiumPricing?.length > 0).length;

    res.innerHTML = `
      <div class="results-header">
        <span class="results-title">${items.length} results for <strong style="color:var(--text)">${name}.*</strong></span>
        <span class="results-count">${available} available · ${premium} premium</span>
      </div>
      <div class="results-grid">
        ${items.map((d, i) => renderResultCard(d, i * 40)).join('')}
      </div>`;
  } catch (e) {
    res.innerHTML = `
      <div class="state-msg error-msg">
        <span class="icon">⚡</span>
        ${e.message || 'Request failed'}
      </div>
      ${corsErrorHtml('availability check')}`;
  }

  btn.disabled = false;
  label.textContent = 'Check';
}

function renderResultCard(d, delay) {
  const isPremium = d.premiumPricing && d.premiumPricing.length > 0;
  const isAvail   = d.result === 'available';
  const cls       = isPremium ? 'premium' : (isAvail ? 'available' : 'unavailable');
  const label     = isPremium ? '★ Premium' : (isAvail ? '● Available' : '✕ Taken');
  const registerUrl = `https://www.spaceship.com/domain-registration/?domain=${encodeURIComponent(d.domain)}`;

  let priceHtml = '';
  if (isPremium && d.premiumPricing[0]) {
    const p = d.premiumPricing[0];
    priceHtml = `<span class="price-tag">${p.currency} ${parseFloat(p.price).toFixed(2)}</span>`;
  }

  let actionHtml = '';
  if (isAvail || isPremium) {
    actionHtml = `<a class="register-btn" href="${registerUrl}" target="_blank">Register →</a>`;
  }

  return `
    <div class="result-card ${cls}" style="animation-delay:${delay}ms">
      <span class="result-domain">${d.domain}</span>
      <div class="result-right">
        <span class="status-badge ${cls}">
          <span class="indicator"></span>${label}
        </span>
        ${priceHtml}
        ${actionHtml}
      </div>
    </div>`;
}

// ============================================================
// SINGLE DOMAIN CHECK / INFO
// ============================================================
async function checkSingle() {
  const raw = document.getElementById('singleInput').value.trim().toLowerCase();
  if (!raw) return;

  const domain = raw.includes('.') ? raw : raw + '.com';

  const btn   = document.getElementById('singleBtn');
  const label = document.getElementById('singleBtnLabel');
  btn.disabled = true;
  label.innerHTML = '<span class="spinner"></span>';

  const res = document.getElementById('singleResult');
  res.innerHTML = '<div class="skeleton-card" style="height:180px; border-radius:20px;"></div>';

  try {
    // Try availability first, then domain info
    const [availData, infoData] = await Promise.allSettled([
      apiFetch(`/domains/${encodeURIComponent(domain)}/available`),
      apiFetch(`/domains/${encodeURIComponent(domain)}`)
    ]);

    let html = '<div class="single-check">';
    html += `<div class="single-check-header">
      <span class="single-domain-name">${domain}</span>`;

    if (availData.status === 'fulfilled') {
      const av = availData.value;
      const isPremium = av.premiumPricing && av.premiumPricing.length > 0;
      const isAvail   = av.result === 'available';
      const cls       = isPremium ? 'premium' : (isAvail ? 'available' : 'unavailable');
      const lbl       = isPremium ? '★ Premium' : (isAvail ? '● Available' : '✕ Taken');
      html += `<span class="status-badge ${cls}"><span class="indicator"></span>${lbl}</span>`;
    }

    html += '</div>';

    // Availability details
    if (availData.status === 'fulfilled') {
      const av = availData.value;
      const isPremium = av.premiumPricing && av.premiumPricing.length > 0;
      const isAvail   = av.result === 'available';
      html += '<div class="detail-grid">';
      html += detailItem('Availability', av.result, isAvail ? 'green' : 'red');
      if (isPremium && av.premiumPricing[0]) {
        const p = av.premiumPricing[0];
        html += detailItem('Premium Price', `${p.currency} ${parseFloat(p.price).toFixed(2)}`, 'yellow');
        html += detailItem('Operation', p.operation, 'blue');
      }

      if (isAvail || isPremium) {
        const registerUrl = `https://www.spaceship.com/domain-registration/?domain=${encodeURIComponent(domain)}`;
        html += `</div><div style="margin-top:14px;"><a class="register-btn" href="${registerUrl}" target="_blank" style="font-size:0.85rem; padding:8px 18px;">Register on Spaceship →</a></div>`;
      } else {
        html += '</div>';
      }
    }

    // Registered domain details
    if (infoData.status === 'fulfilled') {
      const info = infoData.value;
      html += '<hr style="border:none; border-top:1px solid var(--border); margin:20px 0;">';
      html += '<div class="detail-grid">';
      if (info.registrationDate) html += detailItem('Registered', formatDate(info.registrationDate), 'blue');
      if (info.expirationDate) html += detailItem('Expires', formatDate(info.expirationDate), info.lifecycleStatus === 'expired' ? 'red' : 'yellow');
      if (info.lifecycleStatus) html += detailItem('Status', info.lifecycleStatus, info.lifecycleStatus === 'registered' ? 'green' : 'red');
      if (info.autoRenew !== undefined) html += detailItem('Auto-Renew', info.autoRenew ? 'Enabled' : 'Disabled', info.autoRenew ? 'green' : 'red');
      if (info.nameservers?.provider) html += detailItem('Nameservers', info.nameservers.provider, 'blue');
      if (info.privacyProtection?.level) html += detailItem('Privacy', info.privacyProtection.level, 'green');
      html += '</div>';
      if (info.nameservers?.hosts?.length) {
        html += `<div style="margin-top:12px;">
          <div class="detail-label" style="margin-bottom:8px;">Nameserver Hosts</div>
          ${info.nameservers.hosts.map(h => `<div style="font-family:'Space Mono',monospace;font-size:0.8rem;color:var(--text-dim);margin-bottom:4px;">↳ ${h}</div>`).join('')}
        </div>`;
      }
    }

    html += '</div>';
    res.innerHTML = html;
  } catch (e) {
    res.innerHTML = `
      <div class="state-msg error-msg">
        <span class="icon">⚡</span>
        ${e.message || 'Request failed'}
      </div>
      ${corsErrorHtml('domain lookup')}`;
  }

  btn.disabled = false;
  label.textContent = 'Look Up';
}

function detailItem(label, value, colorClass = '') {
  return `<div class="detail-item">
    <div class="detail-label">${label}</div>
    <div class="detail-value ${colorClass}">${value}</div>
  </div>`;
}

function formatDate(iso) {
  try {
    return new Date(iso).toLocaleDateString('en-CA', { year:'numeric', month:'short', day:'numeric' });
  } catch { return iso; }
}

// ============================================================
// MY DOMAINS
// ============================================================
async function loadMyDomains() {
  const container = document.getElementById('myDomainsResult');
  container.innerHTML = `
    <div class="state-msg">
      <span class="icon"><span class="spinner" style="width:32px;height:32px;border-width:3px;"></span></span>
      Loading your domains…
    </div>`;

  try {
    const data = await apiFetch('/domains?take=100&skip=0');
    const items = data.items || [];

    if (!items.length) {
      container.innerHTML = `<div class="state-msg"><span class="icon">🛸</span>No domains found in this account.</div>`;
      return;
    }

    const sorted = [...items].sort((a,b) => a.name.localeCompare(b.name));

    let html = `
      <div class="results-header">
        <span class="results-title">My Domains</span>
        <span class="results-count">${data.total} total</span>
      </div>`;
    html += sorted.map((d, i) => renderDomainRow(d, i * 30)).join('');
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = `
      <div class="state-msg error-msg">
        <span class="icon">⚡</span>
        ${e.message || 'Request failed'}
      </div>
      ${corsErrorHtml('domain list')}
      <div style="text-align:center;margin-top:16px;">
        <button class="btn-search" style="margin:0 auto;display:inline-flex;" onclick="loadMyDomains()">Retry</button>
      </div>`;
  }
}

function renderDomainRow(d, delay) {
  const statusCls = d.lifecycleStatus || 'registered';
  const exp = d.expirationDate ? formatDate(d.expirationDate) : '—';
  const reg = d.registrationDate ? formatDate(d.registrationDate) : '—';
  return `
    <div class="domain-row" style="animation-delay:${delay}ms">
      <div class="domain-row-left">
        <div class="domain-row-name">${d.unicodeName || d.name}</div>
        <div class="domain-row-meta">
          <span>Reg: ${reg}</span>
          <span>Exp: ${exp}</span>
          ${d.autoRenew ? '<span style="color:var(--available)">↻ Auto-Renew</span>' : ''}
        </div>
      </div>
      <span class="lifecycle-badge ${statusCls}">${statusCls}</span>
    </div>`;
}
